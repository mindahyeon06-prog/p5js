<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js Visual Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      padding: 40px 24px;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, #ffd6e8, transparent 35%),
        radial-gradient(circle at bottom right, #bde7ff, transparent 40%),
        linear-gradient(135deg, #fff7fb, #edf7ff);
      color: #2f2f2f;
    }

    header {
      text-align: center;
      margin-bottom: 34px;
    }

    h1 {
      font-size: 2.3rem;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    .intro {
      color: #666;
      font-size: 0.95rem;
    }

    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 26px;
      max-width: 1080px;
      margin: 0 auto;
    }

    .cell {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(80, 80, 120, 0.18);
      backdrop-filter: blur(10px);
      transition: 0.25s ease;
    }

    .cell:hover {
      transform: translateY(-7px);
      box-shadow: 0 18px 40px rgba(80, 80, 120, 0.25);
    }

    .title {
      padding: 14px 16px;
      font-weight: bold;
      text-align: center;
      background: linear-gradient(90deg, #fff0f7, #eef8ff);
      border-bottom: 1px solid #eee;
    }

    .desc {
      display: block;
      margin-top: 5px;
      font-size: 0.78rem;
      font-weight: normal;
      color: #777;
    }

    .frame-wrap {
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      position: relative;
      background: #fff;
    }

    iframe {
      width: 600px;
      height: 400px;
      border: none;
      transform: scale(0.9);
      transform-origin: top left;
    }

    footer {
      text-align: center;
      margin-top: 34px;
      color: #777;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>
  <header>
    <h1>My p5.js Visual Portfolio</h1>
    <p class="intro">정적 작품에서 동적 작품으로 이어지는 과제 1~4 모음</p>
  </header>

  <main id="projects">

    <section class="cell">
      <div class="title">
        과제 1 | 추상화
        <span class="desc">정적인 색면 구성과 낮·밤의 대비</span>
      </div>
      <div class="frame-wrap">
        <iframe src="sample1/index.html"></iframe>
      </div>
    </section>

    <section class="cell">
      <div class="title">
        과제 4 | 움직이는 추상화
        <span class="desc">시간에 따라 변화하는 색과 크기</span>
      </div>
      <div class="frame-wrap">
        <iframe src="sample4/index.html"></iframe>
      </div>
    </section>

    <section class="cell">
      <div class="title">
        과제 2 | 캐리커처
        <span class="desc">기본 도형으로 표현한 인물 이미지</span>
      </div>
      <div class="frame-wrap">
        <iframe src="sample2/index.html"></iframe>
      </div>
    </section>

    <section class="cell">
      <div class="title">
        과제 3 | 움직이는 캐리커처
        <span class="desc">마우스와 키보드로 반응하는 인터랙션</span>
      </div>
      <div class="frame-wrap">
        <iframe src="sample3/index.html"></iframe>
      </div>
    </section>

  </main>

  <footer>
    p5.js · HTML · CSS · JavaScript
  </footer>
</body>
</html>
