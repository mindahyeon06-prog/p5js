<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 작품 포트폴리오</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      padding: 36px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffe6f0, #e3f2ff);
      color: #333;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 2rem;
    }

    .intro {
      text-align: center;
      margin-bottom: 28px;
      color: #666;
    }

    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    .cell {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      transition: transform 0.2s;
    }

    .cell:hover {
      transform: translateY(-5px);
    }

    .title {
      padding: 12px;
      text-align: center;
      font-weight: bold;
      background: #fff7fb;
      border-bottom: 1px solid #eee;
    }

    .frame-wrap {
      width: 100%;
      aspect-ratio: 3 / 2;
      overflow: hidden;
      position: relative;
    }

    iframe {
      width: 600px;
      height: 400px;
      border: none;
      transform: scale(0.83);
      transform-origin: top left;
    }
  </style>
</head>
<body>

  <h1>나의 p5.js 작품 포트폴리오</h1>
  <p class="intro">과제 1~4를 정적 작품에서 동적 작품 순서로 구성했습니다.</p>

  <main id="projects">

    <div class="cell">
      <div class="title">과제 1 | 추상화</div>
      <div class="frame-wrap">
        <iframe src="sample1/index.html"></iframe>
      </div>
    </div>

    <div class="cell">
      <div class="title">과제 4 | 동적 추상화</div>
      <div class="frame-wrap">
        <iframe src="sample4/index.html"></iframe>
      </div>
    </div>

    <div class="cell">
      <div class="title">과제 2 | 캐리커처</div>
      <div class="frame-wrap">
        <iframe src="sample2/index.html"></iframe>
      </div>
    </div>

    <div class="cell">
      <div class="title">과제 3 | 움직이는 캐리커처</div>
      <div class="frame-wrap">
        <iframe src="sample3/index.html"></iframe>
      </div>
    </div>

  </main>

</body>
</html>
